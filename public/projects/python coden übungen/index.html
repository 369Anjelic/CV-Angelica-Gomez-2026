<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python Coding Übungen - IDE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: #252526;
      border-bottom: 1px solid #3e3e42;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .header h1 {
      font-size: 16px;
      color: #fff;
      font-weight: 600;
    }

    .header-badge {
      background: #007acc;
      color: white;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 12px;
    }

    /* Main Content */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: #1e1e1e;
      border-right: 1px solid #3e3e42;
      overflow-y: auto;
      padding: 10px 0;
    }

    .exercise-item {
      padding: 8px 15px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.2s;
      user-select: none;
      font-size: 13px;
    }

    .exercise-item:hover {
      background: #2d2d30;
    }

    .exercise-item.active {
      background: #007acc;
      border-left-color: #007acc;
      color: #fff;
    }

    .exercise-label {
      font-weight: 500;
      color: #b4b4b4;
    }

    .exercise-item.active .exercise-label {
      color: #fff;
    }

    /* Editor Area */
    .editor-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Code Panel */
    .code-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #3e3e42;
    }

    .panel-header {
      background: #252526;
      border-bottom: 1px solid #3e3e42;
      padding: 10px 15px;
      font-size: 12px;
      font-weight: 600;
      color: #d4d4d4;
    }

    .code-editor {
      flex: 1;
      overflow-y: auto;
      position: relative;
      background: #1e1e1e;
    }

    .code-content {
      padding: 15px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    pre {
      margin: 0;
      background: #1e1e1e !important;
    }

    code {
      background: #1e1e1e !important;
      color: #d4d4d4 !important;
    }

    .hljs {
      background: #1e1e1e !important;
      color: #d4d4d4 !important;
    }

    /* Terminal Panel */
    .terminal-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #1e1e1e;
    }

    .terminal {
      flex: 1;
      overflow-y: auto;
      background: #000;
      padding: 15px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      color: #0dff00;
    }

    .terminal-line {
      margin: 0;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .terminal-input {
      color: #ffaa00;
      margin: 5px 0;
    }

    .terminal-output {
      color: #0dff00;
      margin: 3px 0;
    }

    .terminal-error {
      color: #ff0000;
      margin: 3px 0;
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    ::-webkit-scrollbar-track {
      background: #1e1e1e;
    }

    ::-webkit-scrollbar-thumb {
      background: #464647;
      border-radius: 6px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #5a5a5a;
    }

    /* Info Text */
    .exercise-description {
      padding: 15px;
      background: #252526;
      border-top: 1px solid #3e3e42;
      font-size: 12px;
      color: #a0a0a0;
      max-height: 100px;
      overflow-y: auto;
    }

    @media (max-width: 1200px) {
      .sidebar {
        width: 240px;
      }
      .exercise-item {
        padding: 6px 12px;
        font-size: 12px;
      }
    }

    @media (max-width: 768px) {
      .editor-area {
        flex-direction: column;
      }

      .code-panel {
        flex: 0.5;
        border-right: none;
        border-bottom: 1px solid #3e3e42;
      }

      .terminal-panel {
        flex: 0.5;
      }

      .sidebar {
        width: 100%;
        max-height: 150px;
        border-right: none;
        border-bottom: 1px solid #3e3e42;
        display: flex;
        overflow-x: auto;
      }

      .exercise-item {
        white-space: nowrap;
        flex-shrink: 0;
      }
    }
  </style>
</head>

print("=== Stoppuhr ===\\n")

input("Starten? (Enter)")
start_time = time.time()

try:
    while True:
        elapsed = time.time() - start_time
        minutes, seconds = divmod(int(elapsed), 60)
        print(f"\\rZeit: {minutes:02d}:{seconds:02d}", end="")
        time.sleep(0.1)
except KeyboardInterrupt:
    elapsed = time.time() - start_time
    minutes, seconds = divmod(int(elapsed), 60)
    print(f"\\n\\nGestoppt: {minutes:02d}:{seconds:02d}")`,
        output: `=== Stoppuhr ===

Starten? (Enter)

Zeit: 00:05
Zeit: 00:10
Zeit: 00:15

Gestoppt: 00:15`
      }
    ];

    // Render Sidebar
    function renderSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.innerHTML = exercises.map(ex => `
        <div class="exercise-item" data-id="${ex.id}">
          <div class="exercise-label">${ex.name}</div>
        </div>
      `).join('');

      document.querySelectorAll('.exercise-item').forEach((item, idx) => {
        item.addEventListener('click', () => loadExercise(idx));
        if (idx === 0) item.classList.add('active');
      });
    }

    // Load Exercise
    function loadExercise(idx) {
      const exercise = exercises[idx];

      // Update Active
      document.querySelectorAll('.exercise-item').forEach(item => item.classList.remove('active'));
      document.querySelectorAll('.exercise-item')[idx].classList.add('active');

      // Update Code
      const codeDisplay = document.getElementById('code-display');
      codeDisplay.textContent = exercise.code;
      hljs.highlightElement(codeDisplay);

      // Update Terminal
      const terminal = document.getElementById('terminal');
      terminal.innerHTML = `
        <div class="terminal-line">$ python main.py</div>
        ${exercise.output.split('\n').map(line =>
          `<div class="terminal-line ${line.includes('>>>') || line.includes('>>>') ? 'terminal-input' : 'terminal-output'}">${line}</div>`
        ).join('')}
      `;

      // Scroll to top
      document.querySelector('.code-editor').scrollTop = 0;
      terminal.scrollTop = terminal.scrollHeight;
    }

    // Initialize
    renderSidebar();
    loadExercise(0);
  </script>
</body>
</html>
