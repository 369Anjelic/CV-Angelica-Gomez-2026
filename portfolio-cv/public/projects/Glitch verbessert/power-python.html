<!-- Power Python Learning Module -->
<div id="powerPythonModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000;">
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; height: 95%; background: white; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">

        <!-- Header -->
        <div style="padding: 20px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(135deg, #3987b8 0%, #2c6b94 100%); color: white; border-radius: 12px 12px 0 0;">
            <h2 style="margin: 0; font-size: 24px; font-weight: 600;">⚡ Power Python Learning Module</h2>
            <button onclick="closePowerPython()" style="background: rgba(255,255,255,0.2); border: none; color: white; font-size: 24px; cursor: pointer; padding: 0 10px; border-radius: 4px;">✕</button>
        </div>

        <!-- Main Content - 2 Columns -->
        <div style="display: flex; flex: 1; overflow: hidden; gap: 20px; padding: 20px;">

            <!-- LEFT: Code Editor + Terminal -->
            <div style="flex: 1; display: flex; flex-direction: column; gap: 15px;">

                <!-- CODE EDITOR -->
                <div style="flex: 1; display: flex; flex-direction: column; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #1e1e1e;">
                    <div style="padding: 10px 15px; background: #2d2d2d; border-bottom: 1px solid #444; color: #888; font-size: 12px; font-weight: 600;">📝 Python Code Editor</div>
                    <textarea id="pythonCodeEditor" placeholder="Schreibe hier deinen Python Code..." style="flex: 1; padding: 15px; font-family: 'Courier New', monospace; font-size: 14px; background: #1e1e1e; color: #d4d4d4; border: none; resize: none; line-height: 1.6;">#!/usr/bin/env python3

# Beispiel: Hallo Welt
print("Hallo Python!")

# Versuche deinen Code hier:
</textarea>
                </div>

                <!-- BUTTON BAR -->
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button onclick="executePythonCode()" style="flex: 1; padding: 12px 20px; background: #3987b8; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px;">▶ Code Ausführen</button>
                    <button onclick="clearPythonOutput()" style="padding: 12px 20px; background: #888; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px;">Clear Output</button>
                    <button onclick="copyPythonCode()" style="padding: 12px 20px; background: #666; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px;">📋 Copy</button>
                </div>

                <!-- TERMINAL OUTPUT -->
                <div style="flex: 0.7; display: flex; flex-direction: column; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #0d1117;">
                    <div style="padding: 10px 15px; background: #161b22; border-bottom: 1px solid #30363d; color: #8b949e; font-size: 12px; font-weight: 600;">🖥️ Terminal Output</div>
                    <pre id="pythonOutput" style="flex: 1; padding: 15px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px; color: #79c0ff; margin: 0; white-space: pre-wrap; word-wrap: break-word;">▸ Output wird hier angezeigt...</pre>
                </div>
            </div>

            <!-- RIGHT: Bot Chat Panel -->
            <div style="flex: 0.6; display: flex; flex-direction: column; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #f9f9f9;">
                <div style="padding: 10px 15px; background: #3987b8; color: white; border-bottom: 1px solid #ddd; font-size: 12px; font-weight: 600;">💬 Power Python Mentor</div>

                <!-- Chat Messages -->
                <div id="powerPythonChat" style="flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px;">
                    <div style="background: rgba(57, 135, 184, 0.1); padding: 10px 12px; border-radius: 6px; font-size: 13px; color: #3987b8; border-left: 3px solid #3987b8;">
                        <strong>Glitch Python:</strong> Willkommen im Power Python Modul! Schreib deinen Code links, führe ihn aus und ich helfe dir damit! 🚀
                    </div>
                </div>

                <!-- Input -->
                <div style="padding: 12px; border-top: 1px solid #ddd; display: flex; gap: 8px;">
                    <input id="powerPythonInput" type="text" placeholder="Frag mich etwas zu deinem Code..." style="flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px;">
                    <button onclick="askPythonMentor()" style="padding: 8px 16px; background: #3987b8; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600;">Send</button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Power Python Styles */
    #powerPythonOutput::-webkit-scrollbar {
        width: 8px;
    }
    #powerPythonOutput::-webkit-scrollbar-track {
        background: #161b22;
    }
    #powerPythonOutput::-webkit-scrollbar-thumb {
        background: #30363d;
        border-radius: 4px;
    }

    #pythonCodeEditor::-webkit-scrollbar {
        width: 8px;
    }
    #pythonCodeEditor::-webkit-scrollbar-track {
        background: #2d2d2d;
    }
    #pythonCodeEditor::-webkit-scrollbar-thumb {
        background: #444;
        border-radius: 4px;
    }

    #powerPythonChat::-webkit-scrollbar {
        width: 8px;
    }
    #powerPythonChat::-webkit-scrollbar-track {
        background: #f9f9f9;
    }
    #powerPythonChat::-webkit-scrollbar-thumb {
        background: #ddd;
        border-radius: 4px;
    }
</style>

<script>
    let userSessionWords = null;

    function openPowerPython() {
        document.getElementById('powerPythonModal').style.display = 'flex';
        document.getElementById('pythonCodeEditor').focus();
    }

    function closePowerPython() {
        document.getElementById('powerPythonModal').style.display = 'none';
    }

    async function executePythonCode() {
        const code = document.getElementById('pythonCodeEditor').value;
        const outputDiv = document.getElementById('pythonOutput');

        if (!code.trim()) {
            outputDiv.textContent = '⚠️ Bitte schreib zuerst Code!';
            return;
        }

        outputDiv.textContent = '⏳ Code wird ausgeführt...';

        try {
            const response = await fetch('/execute-python', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    code: code,
                    words: userSessionWords
                })
            });

            const result = await response.json();

            if (result.executed) {
                outputDiv.textContent = result.output || '✅ Erfolgreich ausgeführt!';
                if (result.error) {
                    outputDiv.style.color = '#ff6b6b';
                } else {
                    outputDiv.style.color = '#79c0ff';
                }
            } else {
                outputDiv.textContent = '❌ Fehler:\n' + result.output;
                outputDiv.style.color = '#ff6b6b';
            }

            // Automatisch Bot-Feedback holen
            askPythonMentor('Erkläre kurz was dieser Code macht und ob er richtig ist.');
        } catch (err) {
            outputDiv.textContent = '❌ Verbindungsfehler: ' + err.message;
            outputDiv.style.color = '#ff6b6b';
        }
    }

    function clearPythonOutput() {
        document.getElementById('pythonOutput').textContent = '';
    }

    function copyPythonCode() {
        const code = document.getElementById('pythonCodeEditor').value;
        navigator.clipboard.writeText(code).then(() => {
            alert('Code kopiert!');
        });
    }

    async function askPythonMentor(question = null) {
        const input = document.getElementById('powerPythonInput');
        const chatDiv = document.getElementById('powerPythonChat');

        let message = question || input.value;
        if (!message.trim()) return;

        // Zeige User-Nachricht
        const userMsg = document.createElement('div');
        userMsg.style.cssText = 'background: #3987b8; color: white; padding: 10px 12px; border-radius: 6px; font-size: 13px; margin-left: auto; max-width: 90%;';
        userMsg.textContent = message;
        chatDiv.appendChild(userMsg);
        input.value = '';

        // Zeige Loading
        const loadingMsg = document.createElement('div');
        loadingMsg.style.cssText = 'color: #888; font-size: 13px;';
        loadingMsg.textContent = '⏳ Glitch antwortet...';
        chatDiv.appendChild(loadingMsg);
        chatDiv.scrollTop = chatDiv.scrollHeight;

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: message,
                    words: userSessionWords
                })
            });

            const result = await response.json();

            // Entferne Loading
            chatDiv.removeChild(loadingMsg);

            // Zeige Bot-Antwort
            const botMsg = document.createElement('div');
            botMsg.style.cssText = 'background: rgba(57, 135, 184, 0.1); padding: 10px 12px; border-radius: 6px; font-size: 13px; color: #3987b8; border-left: 3px solid #3987b8;';
            botMsg.innerHTML = '<strong>Glitch:</strong> ' + (result.response || 'Fehler bei der Antwort');
            chatDiv.appendChild(botMsg);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        } catch (err) {
            chatDiv.removeChild(loadingMsg);
            const errMsg = document.createElement('div');
            errMsg.style.cssText = 'color: #ff6b6b; font-size: 13px;';
            errMsg.textContent = '❌ Fehler: ' + err.message;
            chatDiv.appendChild(errMsg);
        }
    }

    // Set session words wenn verfügbar
    document.addEventListener('DOMContentLoaded', () => {
        userSessionWords = sessionStorage.getItem('glitch_session_words') || 'demo.user.session';
    });
</script>
