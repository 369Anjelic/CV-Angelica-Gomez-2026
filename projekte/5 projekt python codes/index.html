    * {

      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: #252526;
      border-bottom: 1px solid #3e3e42;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .header h1 {
      font-size: 16px;
      color: #fff;
      font-weight: 600;
    }

    .header-badge {
      background: #007acc;
      color: white;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 12px;
    }

    /* Main Content */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: #1e1e1e;
      border-right: 1px solid #3e3e42;
      overflow-y: auto;
      padding: 10px 0;
    }

    .exercise-item {
      padding: 8px 15px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.2s;
      user-select: none;
      font-size: 13px;
    }

    .exercise-item:hover {
      background: #2d2d30;
    }

    .exercise-item.active {
      background: #007acc;
      border-left-color: #007acc;
      color: #fff;
    }

    .exercise-label {
      font-weight: 500;
      color: #b4b4b4;
    }

    .exercise-item.active .exercise-label {
      color: #fff;
    }

    /* Editor Area */
    .editor-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Code Panel */
    .code-panel {
      flex: 1.2;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #3e3e42;
    }

    /* Description Panel */
    .description-panel {
      flex: 0.9;
      display: flex;
      flex-direction: column;
      background: #1e1e1e;
      border-right: 1px solid #3e3e42;
    }

    .description-content {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      font-size: 12px;
      line-height: 1.6;
      color: #d4d4d4;

      color: #4ec9b0;
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 14px;

      margin: 8px 0;
    }

      margin: 10px 0;
      padding-left: 20px;
    }

    .description-content li {
      margin: 5px 0;
    }

    .description-content code {
      background: #252526 !important;
      padding: 2px 4px;
      border-radius: 2px;
      font-size: 11px;
    }

    .panel-header {
      background: #252526;
      border-bottom: 1px solid #3e3e42;
      padding: 10px 15px;
      font-size: 12px;
      font-weight: 600;
      color: #d4d4d4;
    }

    .code-editor {
      flex: 1;
      overflow-y: auto;
      position: relative;
      background: #1e1e1e;
    }

    .code-content {
      padding: 15px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    pre {
      margin: 0;
      background: #1e1e1e !important;
    }

    code {
      background: #1e1e1e !important;
      color: #d4d4d4 !important;
    }

    .hljs {
      background: #1e1e1e !important;
      color: #d4d4d4 !important;
    }

    /* Terminal Panel */
    .terminal-panel {
      flex: 0.9;
      display: flex;
      flex-direction: column;
      background: #1e1e1e;
    }

    .terminal-header {
      background: #252526;
      border-bottom: 1px solid #3e3e42;
      padding: 8px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      font-weight: 600;
      color: #d4d4d4;
    }

    .run-button {
      background: #007acc;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .run-button:hover {
      background: #005a9e;
    }

    .run-button:active {
      transform: scale(0.95);
    }

    .run-button.loading {
      background: #666;
      cursor: not-allowed;
    }

    .terminal {
      flex: 1;
      overflow-y: auto;
      background: #000;
      padding: 15px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #0dff00;
    }

    .terminal-line {
      margin: 0;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .terminal-input-prompt {
      color: #ffaa00;
      display: inline;
    }

    .terminal-input-prompt {
      margin-top: 5px;
    }

    .terminal-input-box {
      background: #1a1a1a;
      color: #0dff00;
      border: 1px solid #0dff00;
      padding: 6px 8px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      width: calc(100% - 20px);
      outline: none;
      margin-top: 3px;

      border-color: #4ec9b0;
      box-shadow: 0 0 5px rgba(78, 201, 176, 0.3);

    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    ::-webkit-scrollbar-track {
      background: #1e1e1e;
    }

    ::-webkit-scrollbar-thumb {
      background: #464647;
      border-radius: 6px;

      background: #5a5a5a;
    }

      .sidebar {
        width: 250px;
      }

        flex: 0.7;

import time

# Einfacher Decorator
def my_decorator(func):
    def wrapper(*args, **kwargs):
        print(f"Vor {func.__name__}")
        result = func(*args, **kwargs)
        print(f"Nach {func.__name__}")
        return result
    return wrapper

@my_decorator
def greet(name):
    print(f"Hallo, {name}!")

greet("Alice")

# Timing Decorator
def timer(func):
    def wrapper(*args, **kwargs):
        start = time.time()
        result = func(*args, **kwargs)
        elapsed = time.time() - start
        print(f"Zeit: {elapsed:.4f}s")
        return result
    return wrapper

@timer
def slow_function():
    time.sleep(0.1)
    return "Fertig"

    def decorator(func):
        def wrapper(*args, **kwargs):
            for _ in range(times):

      // Disable button
      runBtn.classList.add('loading');
      runBtn.disabled = true;

      // Clear terminal
      terminal.innerHTML = '<div class="terminal-line">$ python main.py</div>';
      terminal.innerHTML += '<div class="terminal-line" style="color: #ffaa00;">[LOADING] Code wird ausgeführt...</div>';

      try {
        // Determine server URL based on environment
        const getServerUrl = () => {
          const hostname = window.location.hostname;

          // Lokal: use localhost
          if (hostname === 'localhost' || hostname === '127.0.0.1') {
            return 'http://127.0.0.1:5000';
          }

          // Production: try to use Next.js API route first, then fallback to Railway
          if (hostname.includes('vercel.app') || hostname.includes('angelica')) {
            return '/api/python';  // Use Next.js API proxy
          }

          // Fallback
          return 'http://127.0.0.1:5000';
        };

        const serverUrl = getServerUrl();

        // Set timeout for fetch
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000); // 15 second timeout

        terminal.innerHTML += '<div class="terminal-line" style="color: #ffaa00;">[SEND] Request wird gesendet zu: ' + serverUrl + '</div>';
        terminal.scrollTop = terminal.scrollHeight;

        const response = await fetch(`${serverUrl}/run`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ code: code }),
          signal: controller.signal
        });

        clearTimeout(timeout);

        terminal.innerHTML += '<div class="terminal-line" style="color: #ffaa00;">[RESPONSE] Antwort erhalten...</div>';

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const result = await response.json();

        terminal.innerHTML = '<div class="terminal-line">$ python main.py</div>';

        // Show output
        if (result.output && result.output.trim()) {
          const lines = result.output.split('\n');
          lines.forEach(line => {
            if (line) {
              terminal.innerHTML += `<div class="terminal-line">${escapeHtml(line)}</div>`;
            }
          });
        }

        // Show errors
        if (result.error && result.error.trim()) {
          terminal.innerHTML += `<div class="terminal-line" style="color: #ff6b6b;">--- ERROR ---</div>`;
          const errorLines = result.error.split('\n');
          errorLines.forEach(line => {
            if (line.trim()) {
              terminal.innerHTML += `<div class="terminal-line" style="color: #ff6b6b;">${escapeHtml(line)}</div>`;
            }
          });
        }

        if (result.success && !result.output) {
          terminal.innerHTML += `<div class="terminal-line" style="color: #4ec9b0;">[OK] Code ausgeführt</div>`;
        }

      } catch (error) {
        terminal.innerHTML += `<div class="terminal-line" style="color: #ff6b6b;">ERROR: ${escapeHtml(error.message)}</div>`;
        if (error.name === 'AbortError') {
          terminal.innerHTML += `<div class="terminal-line" style="color: #ff6b6b;">Timeout nach 15 Sekunden!</div>`;
        }
        terminal.innerHTML += `<div class="terminal-line" style="color: #ffaa00;">Server auf http://127.0.0.1:5000 prüfen</div>`;
      } finally {
        // Re-enable button
        runBtn.classList.remove('loading');
        runBtn.disabled = false;
        terminal.scrollTop = terminal.scrollHeight;
      }
    }

      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
